<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transformations — Group</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #333; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      backdrop-filter: blur(6px);
    }
    label { color: #fff; font-size: 13px; min-width: 110px; }
    input[type=range] { cursor: pointer; width: 130px; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.176.0",
      "three/addons/": "https://esm.sh/three@0.176.0/examples/jsm/",
      "three-scatter": "https://esm.sh/@jaimebboyjt/three-scatter@0.4.0"
    }
  }
  </script>
</head>
<body>
  <div id="ui">
    <div class="row">
      <label>Scale: <strong id="scaleVal">1.00</strong></label>
      <input type="range" id="scaleSlider" min="10" max="200" value="100" step="1" />
    </div>
    <div class="row">
      <label>Rotation Y: <strong id="rotVal">0.00</strong></label>
      <input type="range" id="rotSlider" min="0" max="628" value="0" step="1" />
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
    import { ThreeScatter } from 'three-scatter'

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    renderer.setClearColor('#333')
    document.body.appendChild(renderer.domElement)

    const scene = new THREE.Scene()
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200)
    camera.position.set(0, 8, 20)
    scene.add(camera)

    scene.add(new THREE.AmbientLight(0xffffff, 0.7))
    const dir = new THREE.DirectionalLight(0xffffff, 1.2)
    dir.position.set(8, 12, 8)
    scene.add(dir)

    const surfaceGeo = new THREE.SphereGeometry(5, 32, 32)
    scene.add(new THREE.Mesh(surfaceGeo, new THREE.MeshStandardMaterial({ color: 0x3a6b4e })))

    const model = new THREE.Mesh(
      new THREE.ConeGeometry(0.2, 0.7, 7),
      new THREE.MeshStandardMaterial({ color: 0xc47a3a })
    )

    const scatter = new ThreeScatter(60, surfaceGeo, model)
    scene.add(scatter)

    document.getElementById('scaleSlider').addEventListener('input', function () {
      const s = parseInt(this.value) / 100
      document.getElementById('scaleVal').textContent = s.toFixed(2)
      scatter.scale.set(s, s, s)
    })

    document.getElementById('rotSlider').addEventListener('input', function () {
      const r = parseInt(this.value) / 100
      document.getElementById('rotVal').textContent = r.toFixed(2)
      scatter.rotation.y = r
    })

    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true
    controls.dampingFactor = 0.08

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    ;(function animate() {
      requestAnimationFrame(animate)
      controls.update()
      renderer.render(scene, camera)
    })()
  </script>
</body>
</html>
