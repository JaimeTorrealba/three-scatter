<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remove Collisions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #333; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    #ui { position: absolute; top: 12px; left: 12px; display: flex; gap: 8px; align-items: center; }
    button {
      padding: 6px 14px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.15); }
    button:disabled { opacity: 0.4; cursor: default; }
    .info { color: #fff; font-size: 13px; text-shadow: 0 1px 3px rgba(0,0,0,0.9); }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.176.0",
      "three/addons/": "https://esm.sh/three@0.176.0/examples/jsm/",
      "three-scatter": "https://esm.sh/@jaimebboyjt/three-scatter@0.4.0"
    }
  }
  </script>
</head>
<body>
  <div id="ui">
    <button id="removeBtn">Remove Collisions</button>
    <button id="resetBtn">Reset</button>
    <span class="info" id="info"></span>
  </div>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
    import { ThreeScatter } from 'three-scatter'

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    renderer.setClearColor('#333')
    document.body.appendChild(renderer.domElement)

    const scene = new THREE.Scene()
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200)
    camera.position.set(0, 4, 14)
    scene.add(camera)

    scene.add(new THREE.AmbientLight(0xffffff, 0.7))
    const dir = new THREE.DirectionalLight(0xffffff, 1.2)
    dir.position.set(8, 12, 8)
    scene.add(dir)

    const surfaceGeo = new THREE.SphereGeometry(5, 32, 32)
    scene.add(new THREE.Mesh(surfaceGeo, new THREE.MeshStandardMaterial({ color: 0x3a6b4e })))

    // Intentionally large models to produce many overlaps
    const baseModel = new THREE.Mesh(
      new THREE.ConeGeometry(0.65, 1.6, 7),
      new THREE.MeshStandardMaterial({ color: 0xc47a3a })
    )

    const info = document.getElementById('info')
    const removeBtn = document.getElementById('removeBtn')
    const resetBtn = document.getElementById('resetBtn')

    let scatter = create()

    function create() {
      const s = new ThreeScatter(70, surfaceGeo, baseModel)
      scene.add(s)
      removeBtn.disabled = false
      info.textContent = `${s.children.length} objects`
      return s
    }

    removeBtn.addEventListener('click', () => {
      scatter.removeCollisions()
      info.textContent = `${scatter.children.length} objects (after)`
      removeBtn.disabled = true
    })

    resetBtn.addEventListener('click', () => {
      scatter.cleanGroup()
      scene.remove(scatter)
      scatter = create()
    })

    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true
    controls.dampingFactor = 0.08

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    ;(function animate() {
      requestAnimationFrame(animate)
      controls.update()
      renderer.render(scene, camera)
    })()
  </script>
</body>
</html>
