<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Align to Surface Normal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
    }
    button {
      padding: 6px 14px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.15); }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.176.0",
      "three/addons/": "https://esm.sh/three@0.176.0/examples/jsm/",
      "three-scatter": "https://esm.sh/@jaimebboyjt/three-scatter@0.4.0"
    }
  }
  </script>
</head>
<body>
  <div id="ui">
    <button id="alignBtn">Align to Surface</button>
    <button id="resetBtn">Reset</button>
  </div>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
    import { ThreeScatter } from 'three-scatter'

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    renderer.setClearColor('#444')
    document.body.appendChild(renderer.domElement)

    // Scene & Camera
    const scene = new THREE.Scene()
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200)
    camera.position.set(0, 4, 14)
    scene.add(camera)

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.7))
    const dir = new THREE.DirectionalLight(0xffffff, 1.2)
    dir.position.set(8, 12, 8)
    scene.add(dir)

    // Surface
    const surfaceGeo = new THREE.SphereGeometry(5, 32, 32)
    const sphere = new THREE.Mesh(surfaceGeo, new THREE.MeshStandardMaterial({ color: 0x3a6b4e }))
    scene.add(sphere)

    // Scatter model — simple cone to make orientation visible
    const model = new THREE.Mesh(
      new THREE.ConeGeometry(0.25, 0.7, 7),
      new THREE.MeshStandardMaterial({ color: 0xc47a3a })
    )

    const scatter = new ThreeScatter(120, surfaceGeo, model)
    scatter.alignToSurfaceNormal()
    scene.add(scatter)

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true
    controls.dampingFactor = 0.08

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    // Buttons
    document.getElementById('alignBtn').addEventListener('click', () => {
      scatter.alignToSurfaceNormal()
    })

    document.getElementById('resetBtn').addEventListener('click', () => {
      scatter.setAll(child => child.rotation.set(0, 0, 0))
    })

    // Loop
    ;(function animate() {
      requestAnimationFrame(animate)
      controls.update()
      renderer.render(scene, camera)
    })()
  </script>
</body>
</html>
